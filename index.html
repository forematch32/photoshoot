<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Photostrip</title>
    <style>
        :root {
            --bg-body: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --text-color: white;
            --btn-shot: #e94560;
        }
        body {
            font-family: sans-serif;
            background: var(--bg-body);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        video {
            width: 100%;
            border-radius: 10px;
            background: #000;
            transform: scaleX(-1);
        }
        #counter {
            font-size: 50px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            color: #e94560;
            font-weight: bold;
        }
        .btns { margin-top: 20px; }
        button {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            background: var(--btn-shot);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        #result {
            width: 150px;
            margin-top: 20px;
            display: none;
            border: 5px solid white;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 id="status">Filmstrip Ready</h2>
    <div style="position: relative;">
        <div id="counter">3</div>
        <video id="view" autoplay playsinline></video>
    </div>
    <div class="btns">
        <button id="shot">START SESSION</button>
        <a id="download" style="display:none; color:cyan; margin-top:10px; display:block;">Download Click Here</a>
    </div>
    <canvas id="output" width="662" height="1600" style="display:none;"></canvas>
    <img id="result">
</div>

<script>
    const view = document.getElementById('view');
    const output = document.getElementById('output');
    const btn = document.getElementById('shot');
    const res = document.getElementById('result');
    const dl = document.getElementById('download');
    const counterDisplay = document.getElementById('counter');
    const statusText = document.getElementById('status');

    const templateImg = new Image();
    // Gunakan URL gambar yang kamu kirim tadi (atau ganti ke nama file lokal jika pakai server)
    templateImg.src = 'Filmstrip High Quality Png - Blank Photo Booth Strip, Transparent Png(662x1600) - PinPng.jpg';

    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            view.srcObject = stream;
        } catch (e) {
            alert("Buka file ini menggunakan 'Live Server' di VS Code atau izinkan kamera!");
        }
    }

    const wait = (ms) => new Promise(res => setTimeout(res, ms));

    btn.onclick = async () => {
        const ctx = output.getContext('2d');
        btn.disabled = true;
        res.style.display = 'none';
        
        const pos = [55, 435, 815, 1200];

        for (let i = 0; i < 4; i++) {
            statusText.innerText = `Shot ${i+1}/4`;
            for (let c = 3; c > 0; c--) {
                counterDisplay.innerText = c;
                counterDisplay.style.display = 'block';
                await wait(800);
            }
            counterDisplay.style.display = 'none';
            
            // Gambar foto
            ctx.save();
            ctx.translate(85 + 490, pos[i]);
            ctx.scale(-1, 1);
            ctx.drawImage(view, 0, 0, 490, 345);
            ctx.restore();
            await wait(500);
        }

        // Gambar template DI ATAS foto (Layer atas)
        ctx.drawImage(templateImg, 0, 0, 662, 1600);

        try {
            const data = output.toDataURL('image/png');
            res.src = data;
            res.style.display = 'block';
            dl.href = data;
            dl.style.display = 'block';
            statusText.innerText = "Selesai!";
        } catch (err) {
            console.error(err);
            alert("Error: Browser memblokir penggabungan gambar. Coba jalankan lewat VS Code Live Server!");
        }
        
        btn.disabled = false;
    };

    init();
</script>
</body>
</html>
